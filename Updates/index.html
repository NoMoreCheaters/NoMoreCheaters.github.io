<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Updates - CubeCraft Player Report Form</title>
<style>

.log-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 15px; }
.version {  font-size: 1.3em; font-weight: bold; color: #2c3e50; }
.date { font-size: 0.9em; color: #888; }

.log-list { list-style: none; padding: 0; margin: 0; }
.log-item { margin-bottom: 12px; line-height: 1.6; font-size: 0.95em; }

.tag-text { font-weight: bold; color: #2c3e50; margin-right: 4px; }

.pagination-wrapper { width: 100%; display: flex; justify-content: center; margin: 30px 0 20px 0; }

.pagination { display: flex; align-items: center; gap: 8px; }

.page-btn { background: white; color: #2c3e50 ; border: 1px solid #ddd; padding: 8px 14px; border-radius: 6px; font-size: 0.9em; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: all 0.2s; }

.page-btn:hover:not(.disabled):not(.active) { background: #2c3e50; color: white ; border-color: #2c3e50; }

.page-btn.active { background: #2c3e50; color: white; border-color: #2c3e50; font-weight: bold; cursor: default; }

.page-btn.disabled { color: #bdc3c7; background: #f4f7f9; border-color: #ddd; cursor: not-allowed; }

h2 { font-size: 1.8em; color: #2c3e50; margin-top: 10px; margin-bottom: 20px; font-weight: bold; }

</style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="container">
  
  <div id="log-container">
  
  <h2>Changelog</h2>
  
  <div class="pagination-wrapper">
    <div class="pagination" id="pagination"></div>
  </div>
    
  </div>
  
  </div>

<div id="footer-placeholder"></div>

<script>
const itemsPerPage = 10;
let currentPage = 1;

function displayPage(page) {
  const container = document.getElementById('log-container');
  const cards = Array.from(container.getElementsByClassName('card'));
  const totalPages = Math.ceil(cards.length / itemsPerPage);
  
  if (page < 1) page = 1;
  if (page > totalPages) page = totalPages;
  currentPage = page;

  cards.forEach((card, index) => {
    const start = (page - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    if (index >= start && index < end) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });

  const pagination = document.getElementById('pagination');
  pagination.innerHTML = '';


  const prevBtn = document.createElement('a');
  prevBtn.href = '#';
  prevBtn.className = `page-btn ${currentPage === 1 ? 'disabled' : ''}`;
  prevBtn.innerText = '« Prev';
  prevBtn.onclick = (e) => { e.preventDefault(); if (currentPage > 1) displayPage(currentPage - 1); };
  pagination.appendChild(prevBtn);

  for (let i = 1; i <= totalPages; i++) {
    const pageBtn = document.createElement('a');
    pageBtn.href = '#';
    pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
    pageBtn.innerText = i;
    pageBtn.onclick = (e) => { e.preventDefault(); displayPage(i); };
    pagination.appendChild(pageBtn);
  }

  const nextBtn = document.createElement('a');
  nextBtn.href = '#';
  nextBtn.className = `page-btn ${currentPage === totalPages ? 'disabled' : ''}`;
  nextBtn.innerText = 'Next »';
  nextBtn.onclick = (e) => { e.preventDefault(); if (currentPage < totalPages) displayPage(currentPage + 1); };
  pagination.appendChild(nextBtn);
}

document.addEventListener('DOMContentLoaded', () => {
  renderChangelogs();
  displayPage(1);
});

fetch('/header.html')
    .then(response => response.text())
    .then(data => {
      const placeholder = document.getElementById('header-placeholder');
      placeholder.innerHTML = data;

      const script = placeholder.querySelector('script');
      if (script) {
        eval(script.innerText);
      }
    })
    .catch(error => console.error('Failed to load header:', error));
  
  const changelogData = [
    {
    version: "Version 1.1.0",
    date: "Updated: Jun 13, 2026",
    desc: "We have added a reset button to the player report form. You can now instantly clear all input fields and checkboxes to start a new report easily.",
    tag: "[Added]",
    detail: "Reset form button."
  },
  {
    version: "Version 1.0.2",
    date: "Updated: Jun 9, 2026",
    desc: "We have optimized the footer layout for smaller screens to make it easier to read. We will continue improving the mobile experience, so stay tuned for more updates.",
    tag: "[Improved]",
    detail: "Partial mobile support for footers."
  },
  {
    version: "Version 1.0.1",
    date: "Updated: Jun 4, 2026",
    desc: "We are excited to introduce our first mobile-friendly update! The header layout has been optimized for smaller screens to make navigation easier. We will continue improving the mobile experience, so stay tuned for more updates.",
    tag: "[Improved]",
    detail: "Partial mobile support for headers."
  },
  {
    version: "Version 1.0.0",
    date: "Updated: Jun 2, 2026",
    desc: "Welcome to the official release of the CubeCraft Player Report Form! This utility was built from scratch to help players quickly format and submit reports on the forums, making the report process smoother and more efficient.",
    tag: "[Released]",
    detail: "Initial official launch of the core report generator tool."
  }
];

function renderChangelogs() {
  const container = document.getElementById('log-container');

  container.innerHTML = '<h2 style="font-size: 1.8em; color: #2c3e50; margin-top: 10px; margin-bottom: 20px; font-weight: bold;">Changelog</h2>';

  changelogData.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="log-header">
        <h2 class="version" style="margin: 0;">${item.version}</h2>
        <span class="date">${item.date}</span>
      </div>
      <ul class="log-list">
        <li class="log-item">
          <p style="margin: 15px 0 15px 0; line-height: 1.6; color: #555; font-size: 0.95em;">${item.desc}</p>
          <div style="border-top: 1px dashed #ddd; margin: 15px 0;"></div>
          <p style="margin: 0; line-height: 1.5; color: #333;">
            <span class="tag-text">${item.tag}</span> ${item.detail}
          </p>
        </li>
      </ul>
    `;
    container.appendChild(card);
  });

  const wrapper = document.createElement('div');
  wrapper.className = 'pagination-wrapper';
  wrapper.innerHTML = '<div class="pagination" id="pagination"></div>';
  container.appendChild(wrapper);
}

fetch('/footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Failed to load footer:', error));

</script>
</body>
</html>
