<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CubeCraft Player Report Form</title>
<meta name="description" content="Easily generate formatted player reports for CubeCraft forums. Input usernames, evidence URLs, timestamps, and server details to copy and paste instantly.">
<style>

h2 { font-size: 1.3em; color: #2c3e50; margin-top: 0; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }

.field-group { margin-bottom: 15px;  }
label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; color: #555; }
    
input[type="text"], input[type="datetime-local"], select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    
.input-with-btn { display: flex; gap: 5px; }
.paste-btn { background: #6c757d; color: white; border: none; padding: 0 15px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }

.checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
.checkbox-item { font-weight: normal; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px; margin: 0; }

.ts-row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
.ts-time { flex: 0.3; }
.ts-memo { flex: 0.7; }
.del-btn { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }

.add-btn { background: #6c757d; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 5px; }
.copy-btn { background: #007bff; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; }

#total-preview { white-space: pre-wrap; background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; margin-top: 15px; line-height: 1.6; font-family: monospace; }
.history-item { background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-left: 5px solid #007bff; font-size: 0.85em; }
.action-btn { background: #6c757d; color: white; border: none; padding: 0 12px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.copy-small-btn { background: #17a2b8; }

</style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="container">
<div class="card">
<h2>CubeCraft Player Report Form</h2>
<p style="font-size: 0.8em; color: #888; margin-top: -5px; margin-bottom: 20px; text-align: right;">Last Updated: Jun 2, 2026</p>
            
<div class="field-group">
<label>What is/are their username(s)?</label>
<div class="input-with-btn">
<input type="text" id="c-name" placeholder="Input name..." oninput="update()">
<button class="action-btn copy-small-btn" onclick="copyFrom('c-name')">Copy</button>
<button class="action-btn" onclick="pasteTo('c-name')">Paste</button>
</div>
</div>

<div class="field-group">
<label>Date & Time (JST):</label>
<input type="datetime-local" id="c-datetime" oninput="update()">
</div>
  
<div class="field-group">
<label>Offence:</label>
<select id="c-offence" onchange="toggleReasonVisibility(); update();">
<option value="Cheating">Cheating</option>
<option value="Teaming">Teaming</option>
<option value="Trolling">Trolling</option>
</select>
</div>

<div class="field-group" id="reason-section">
<label>What clients or modifications were they using?</label>
<div class="checkbox-grid" id="reason-options">
<label class="checkbox-item"><input type="checkbox" value="Anti Knockback" onchange="update()"> Anti Knockback</label>
<label class="checkbox-item"><input type="checkbox" value="Chat Bot (Automessages)" onchange="update()"> Chat Bot (Automessages)</label>
<label class="checkbox-item"><input type="checkbox" value="Fly" onchange="update()"> Fly</label>
<label class="checkbox-item"><input type="checkbox" value="Kill Aura" onchange="update()"> Kill Aura</label>
<label class="checkbox-item"><input type="checkbox" value="Reach" onchange="update()"> Reach</label>
<label class="checkbox-item"><input type="checkbox" value="Speed" onchange="update()"> Speed</label>
</div>

<div class="field-group">
<label>Video Evidence URL:</label>
<div class="input-with-btn">
<input type="text" id="c-url" placeholder="https://..." oninput="update()">
<button class="action-btn copy-small-btn" onclick="copyFrom('c-url')">Copy</button>
<button class="action-btn" onclick="pasteTo('c-url')">Paste</button>
</div>
</div>

<div class="field-group">
<label>Timestamps</label>
<div id="ts-area"></div>
<button class="add-btn" onclick="addTsRow()">＋ Add Timestamp</button>
</div>

<div style="display: flex; gap: 15px;">
<div class="field-group" style="flex: 1;">
<label>Server ID</label>
<input type="text" id="c-server" placeholder="Server ID..." oninput="update()">
</div>
<div class="field-group" style="flex: 1;">
<label>Platform</label>
<select id="c-platform" onchange="update()">
<option value="Bedrock">Bedrock</option>
<option value="Java">Java</option>
</select>
</div>
</div>

<strong>【Preview】</strong>
<div id="total-preview"></div>
<button class="copy-btn" onclick="copyAndSave()">Copy All & Save History</button>
<a href="https://www.cubecraft.net/categories/player-reports.150/" target="_blank" style="display: block; text-align: center; margin-top: 10px; text-decoration: none;">
<button type="button" class="add-btn" style="background: #2c3e50; font-weight: bold; padding: 12px; width: 100%; box-sizing: border-box;">🌐 Open CubeCraft Report Page</button>
</a>
<button type="button" onclick="resetForm()" style="background: #ff4757; color: white; width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px;">Reset Form</button>
</div>


<div id="history-section">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
<h3 style="margin: 0;">📂 History</h3>
<button class="action-btn" onclick="clearAllHistory()" style="background: #ff4757; padding: 6px 12px;">Clear All</button>
</div>
<div id="history-list"></div>
</div>

</div>
</div>

<div id="footer-placeholder"></div>

<script>
    window.onload = () => { 

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('c-datetime').value = now.toISOString().slice(0, 16);
        
        addTsRow(); 
        renderHistory();
        update();
    };

    async function pasteTo(id) {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById(id).value = text;
            update();
        } catch (err) { alert("Clipboard access denied."); }
    }
  async function copyFrom(id) {
        const val = document.getElementById(id).value;
        if (!val) return;
        try {
            await navigator.clipboard.writeText(val);
        } catch (err) { alert("Clipboard access denied."); }
    }

    function addTsRow() {
        const area = document.getElementById('ts-area');
        const div = document.createElement('div');
        div.className = 'ts-row';
        div.innerHTML = `
            <input type="text" class="ts-time" placeholder="0:00" oninput="update()">
            <select class="ts-memo-select" onchange="update()" style="flex: 0.3; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                <option value="">Choose...</option>
                <option value="Fly">Fly</option>
                <option value="Kill Aura">Kill Aura</option>
                <option value="Teaming">Teaming</option>
                <option value="Other">Other (Custom)</option>
            </select>
            <input type="text" class="ts-memo-custom" placeholder="Detail" oninput="update()" style="flex: 0.4; display: none; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
            <button class="del-btn" onclick="this.parentElement.remove(); update();">✕</button>
        `;

        const select = div.querySelector('.ts-memo-select');
        const customInput = div.querySelector('.ts-memo-custom');
        select.addEventListener('change', () => {
            if (select.value === 'Other') {
                customInput.style.display = 'block';
            } else {
                customInput.style.display = 'none';
                customInput.value = '';
            }
        });

        area.appendChild(div);
        update();
    }

    function formatDisplayDate(val) {
        if (!val) return "---";
        const d = new Date(val);
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const month = months[d.getUTCMonth()];
        const day = d.getUTCDate();
        const year = d.getUTCFullYear();
        
        let hours = d.getUTCHours();
        const minutes = String(d.getUTCMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12;
        
        return `${month} ${day}, ${year}, ${hours}:${minutes} ${ampm} (UTC)`;
    }

    function update() {
        const name = document.getElementById('c-name').value || "---";
        const dateStr = formatDisplayDate(document.getElementById('c-datetime').value);
        
        const checkboxes = document.querySelectorAll('#reason-options input:checked');
        const reasonText = checkboxes.length > 0 
            ? Array.from(checkboxes).map(cb => cb.value).join(', ') 
            : "---";

        const url = document.getElementById('c-url').value || "---";
        const server = document.getElementById('c-server').value || "---";
        const platform = document.getElementById('c-platform').value;
        
        const rows = document.querySelectorAll('.ts-row');
        let tsArray = [];
        rows.forEach(row => {
            const time = row.querySelector('.ts-time').value.trim();
            const memo = row.querySelector('.ts-memo').value.trim();
            if (time && memo) tsArray.push(`${time}(${memo})`);
            else if (time) tsArray.push(time);
            else if (memo) tsArray.push(`(${memo})`);
        });

        const template = `Hello. I am reporting a cheater.
- Cheater's Name: ${name}
- Date & Time: ${dateStr}
- Reason: ${reasonText}
- Evidence: ${url}
- Timestamps: ${tsArray.join(', ')}
- Server ID: ${server}
- Platform: ${platform}
Please check it. Thank you!`;

        document.getElementById('total-preview').innerText = template;
    }

    async function copyAndSave() {
        const content = document.getElementById('total-preview').innerText;
        await navigator.clipboard.writeText(content);
        
        let history = JSON.parse(localStorage.getItem('reportHistory') || "[]");
            history.unshift({ text: content, date: new Date().toLocaleString() });
        localStorage.setItem('reportHistory', JSON.stringify(history.slice(0, 10)));
        renderHistory();
       const btn = document.querySelector('.copy-btn');
        const originalText = btn.innerText;
        btn.innerText = "🟢 Copied & Saved!";
        btn.style.background = "#2ecc71";
        
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "";
        }, 1200);
    }
    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('reportHistory') || "[]");
        document.getElementById('history-list').innerHTML = history.map(item => `
            <div class="history-item">
                <div style="font-size: 0.7em; color: #888; margin-bottom: 5px;">${item.date}</div>
                <div style="white-space:pre-wrap;">${item.text}</div>
            </div>
        `).join('');
    }
function toggleReasonVisibility() {
        const offence = document.getElementById('c-offence').value;
        const reasonSection = document.getElementById('reason-section');
        if (offence === 'Cheating') {
            reasonSection.style.display = 'block';
        } else {
            reasonSection.style.display = 'none';
        }
    }

    function update() {
        const name = document.getElementById('c-name').value || "---";
        const dateStr = formatDisplayDate(document.getElementById('c-datetime').value);
        
        const offence = document.getElementById('c-offence').value;
        let reasonText = "---";
        
        if (offence === 'Cheating') {
            const checkboxes = document.querySelectorAll('#reason-options input:checked');
            reasonText = checkboxes.length > 0 
                ? Array.from(checkboxes).map(cb => cb.value).join(', ') 
                : "---";
        } else {

            reasonText = offence;
        }

        const url = document.getElementById('c-url').value || "---";
        const server = document.getElementById('c-server').value || "---";
        const platform = document.getElementById('c-platform').value;

        const rows = document.querySelectorAll('.ts-row');
        let tsArray = [];
        rows.forEach(row => {
            const time = row.querySelector('.ts-time').value.trim();
            const selectVal = row.querySelector('.ts-memo-select').value;
            const customVal = row.querySelector('.ts-memo-custom').value.trim();
            const memo = (selectVal === 'Other') ? customVal : selectVal;

            if (time && memo) tsArray.push(`${time}(${memo})`);
            else if (time) tsArray.push(time);
            else if (memo) tsArray.push(`(${memo})`);
        });

        const template = `Hello. I am reporting a cheater.
- Cheater's Name: ${name}
- Date & Time: ${dateStr}
- Reason: ${reasonText}
- Evidence: ${url}
- Timestamps: ${tsArray.join(', ')}
- Server ID: ${server}
- Platform: ${platform}
Please check it. Thank you!`;

        document.getElementById('total-preview').innerText = template;
    }
      window.onload = () => { 
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('c-datetime').value = now.toISOString().slice(0, 16);
        
        addTsRow(); 
        renderHistory();
        toggleReasonVisibility();
        update();
    };
  
  function deleteHistoryItem(index) {
        let history = JSON.parse(localStorage.getItem('reportHistory') || "[]");
        history.splice(index, 1);
        localStorage.setItem('reportHistory', JSON.stringify(history));
        renderHistory();
    }

    function clearAllHistory() {
        if (confirm("Are you sure you want to delete all history?")) {
            localStorage.removeItem('reportHistory');
            renderHistory();
        }
    }
  function renderHistory() {
        const history = JSON.parse(localStorage.getItem('reportHistory') || "[]");
        document.getElementById('history-list').innerHTML = history.map((item, index) => `
            <div class="history-item" style="position: relative;">
                <div style="font-size: 0.7em; color: #888; margin-bottom: 5px;">${item.date}</div>
                <div style="white-space:pre-wrap; padding-right: 25px;">${item.text}</div>
                <button onclick="deleteHistoryItem(${index})" style="position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: #aaa; cursor: pointer; font-size: 14px; font-weight: bold; padding: 0;">✕</button>
            </div>
        `).join('');
    }

fetch('/header.html')
    .then(response => response.text())
    .then(data => {
      const placeholder = document.getElementById('header-placeholder');
      placeholder.innerHTML = data;

      const script = placeholder.querySelector('script');
      if (script) {
        eval(script.innerText);
      }
    })
    .catch(error => console.error('Failed to load header:', error));

function resetForm() {
    if (confirm("Are you sure you want to reset the form? All inputs will be cleared.")) {

        document.getElementById('c-name').value = '';
        document.getElementById('c-url').value = '';
        document.getElementById('c-server').value = '';
        
        document.getElementById('c-offence').selectedIndex = 0;
        document.getElementById('c-platform').selectedIndex = 0;
        
        const checkboxes = document.querySelectorAll('#reason-options input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = false);

        document.getElementById('ts-area').innerHTML = '';
        addTsRow();
        
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('c-datetime').value = now.toISOString().slice(0, 16);
        
        toggleReasonVisibility();
        update();
    }
}

fetch('/footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Failed to load footer:', error));

</script>
</body>
</html>
